<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marmitaria</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <nav></nav>
    </header>
    <main>
        <h2>Cadastre-se para receber as novidades</h2>
        <section id="cardapio">
            <div class="card">
                <form name="cadcliente">
                    <label for="nome">Nome:</label>
                    <input type="text" name="nome" placeholder="Digite seu nome"
                    required><br>
                    <label for="email">E-mail:</label>
                    <input type="email" name="email" placeholder="Digite seu e-mail"
                    required><br>
                    <label for="endereco">Digite o endereço completo:</label><br>
                    <textarea name="endereco"></textarea><br>
                    <label for="interesses">Quais são as informações que 
                        podemos enviar para você?</label>
                    <input type="checkbox" name="salada">Saladas
                    <input type="checkbox" name="fit">Comida FIT
                    <input type="checkbox" name="naturais">Sucos naturais
                    <input type="checkbox" name="saude">Saúde
                    <input type="checkbox" name="emagrecer">Emagrecimento
                    <input type="checkbox" name="outros">Outros<br>
                </form>
            </div>
        </section>
    </main>
    <footer>

    </footer>
    </body>
</html>
